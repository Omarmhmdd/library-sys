# Run Qdrant + MySQL for local development and testing.
# From backend folder: docker-compose up -d
# Then in .env use: DB_HOST=127.0.0.1 (or mysql if Laravel runs in Docker), QDRANT_URL=http://127.0.0.1:6333

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: library_sys
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_ALLOW_EMPTY_PASSWORD: "no"
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

volumes:
  qdrant_storage:
  mysql_data:
